name = "RelExist"
defaultTargets = ["Series07", "Series12", "Series13", "P1", "P2S0", "P2S1", "P2S2", "P2S3", "P2S4", "P2S5", "P2S6", "P2S7", "P2S8", "P2S9"]

# ── Layout (Series 07 complete; Series 03–06, 08–11 closed under `archive/`) ──
# Series 03, 04, 05, 06, 08, 09, 10, and 11 are closed and frozen under `archive/series-03/`…
# `archive/series-11/`; they are no longer registered here. Series 07 is complete under
# `series-07/` and is built here so `lake build` verifies it.
#
# Each series is a distinct module namespace so they can coexist in one package:
# each series' roots live under `SeriesNN.*`. Each aggregator root `SeriesNN`
# (`<series>/formal/<Series>.lean`) imports its workstreams; the `AxiomCheck` root under each
# namespace runs `#print axioms` over that series' build.

# `series-07/formal/` — Series 07 (complete). `Series07` imports `Series07.ws1`…`Series07.ws7`;
# `Series07.AxiomCheck` runs the axiom pass. Series 07 is WHOLLY STANDALONE: every Series
# 4/5/6 lemma it reuses is transcribed into `series-07/formal/Series07/wsNN.lean` and
# re-namespaced `Series07.WSNN` — nothing is imported across series.
[[lean_lib]]
name = "Series07"
srcDir = "../program-1/series-07/formal"
roots = ["Series07", "Series07.AxiomCheck"]

# Series 08, 09, 10, and 11 are CLOSED and frozen under `archive/series-08/`…`archive/series-11/`;
# they are no longer registered here (their formal sources remain readable at
# `archive/series-NN/formal/` but are not built).

# `series-12/formal/` — Series 12 (the program's terminal series). `Series12` imports
# `Series12.ws1`…`Series12.ws7`; `Series12.AxiomCheck` runs the axiom pass. Series 12 is WHOLLY
# STANDALONE: the one prior result it presupposes and names is Series 07, transcribed (not imported)
# into `series-12/formal/Series12/wsNN.lean` and re-namespaced `Series12.WSNN` — nothing is imported
# across series.
[[lean_lib]]
name = "Series12"
srcDir = "../program-1/series-12/formal"
roots = ["Series12", "Series12.AxiomCheck"]

# `series-13/formal/` — Series 13 (the post-terminal coda). `Series13` imports `Series13.ws1`…`Series13.ws5`;
# `Series13.AxiomCheck` runs the axiom pass. Series 13 is WHOLLY STANDALONE: the two prior results it
# presupposes and names are Series 07 and Series 12 WS1, transcribed (not imported) into
# `series-13/formal/Series13/wsNN.lean` and re-namespaced `Series13.WSNN` — nothing is imported across series.
[[lean_lib]]
name = "Series13"
srcDir = "../program-1/series-13/formal"
roots = ["Series13", "Series13.AxiomCheck"]

# `program-2/formal/` — the Program 2 FOUNDATION (`P1`): the Program 1 carrier consolidated under a `P1`
# namespace for Program 2 to transcribe from. `P1` imports `P1.Core` (Series 12 WS1, verbatim) and `P1.Reader`
# (Series 12 WS2, verbatim); `P1.AxiomCheck` runs the axiom pass. The `P1` namespace prefix avoids collision
# with the still-registered `Series12.*` libraries. Standalone: imports only Mathlib and itself.
[[lean_lib]]
name = "P1"
srcDir = "../program-2/formal"
roots = ["P1", "P1.AxiomCheck"]

# `program-2/series-0/formal/` — Program 2 Series 0 (2.0), the GROUND (relating is finite attending). Unlike a
# Program 1 series, Series 0 IMPORTS the `P1` foundation (Program 2 permits it) and builds on it. `P2S0` imports
# `P2S0.ws1`…`P2S0.ws5`; `P2S0.AxiomCheck` runs the axiom pass. Its imports resolve only to `P1`, its own
# `P2S0.*` roots, and Mathlib (gate: `check program-2/series-0 "^import (P1|P2S0)…"`).
[[lean_lib]]
name = "P2S0"
srcDir = "../program-2/series-0/formal"
roots = ["P2S0", "P2S0.AxiomCheck"]

# `program-2/series-1/formal/` — Program 2 Series 1 (2.1), the TICK. Imports the `P2S0` ground (and through it,
# transitively, the `P1` foundation); it does NOT import `P1` directly. `P2S1` imports `P2S1.ws1`…`P2S1.ws5`;
# `P2S1.AxiomCheck` runs the axiom pass. Gate: `check program-2/series-1 "^import (P2S0|P2S1)…"`.
[[lean_lib]]
name = "P2S1"
srcDir = "../program-2/series-1/formal"
roots = ["P2S1", "P2S1.AxiomCheck"]

# `program-2/series-2/formal/` — Program 2 Series 2 (2.2), the OTHER. Imports the `P2S1` ground (and through it,
# transitively, `P2S0` and the `P1` foundation); it does NOT import `P2S0` or `P1` directly. `P2S2` imports
# `P2S2.ws1`…`P2S2.ws5`; `P2S2.AxiomCheck` runs the axiom pass. Gate: `check program-2/series-2 "^import (P2S1|P2S2)…"`.
[[lean_lib]]
name = "P2S2"
srcDir = "../program-2/series-2/formal"
roots = ["P2S2", "P2S2.AxiomCheck"]

# mathlib is retained (cache present under `.lake`); Series 07 imports it.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.15.0"

# `program-2/series-3/formal/` — Program 2 Series 3 (2.3), the COHERENCE. Imports the `P2S2` pair (and through it,
# transitively, `P2S1` / `P2S0` / the `P1` foundation); it does NOT import `P2S1` / `P2S0` / `P1` directly. `P2S3`
# imports `P2S3.ws1`…`P2S3.ws5`; `P2S3.AxiomCheck` runs the axiom pass. The convergence machinery is built FRESH
# and constrained, never imported from Series 12 (excluded for program-review-1's PR1-S1). Gate:
# `check program-2/series-3 "^import (P2S2|P2S3)…"`.
[[lean_lib]]
name = "P2S3"
srcDir = "../program-2/series-3/formal"
roots = ["P2S3", "P2S3.AxiomCheck"]

# `program-2/series-4/formal/` — Program 2 Series 4 (2.4), SPACE. Imports its predecessor `P2S3` (and through it,
# transitively, `P2S2` / `P2S1` / `P2S0` / the `P1` foundation); it does NOT import `P2S3`'s predecessors directly.
# `P2S4` imports `P2S4.ws1`…`P2S4.ws5`; `P2S4.AxiomCheck` runs the axiom pass. The world and the two gradings are
# built FRESH on the attention carrier. Gate: `check program-2/series-4 "^import (P2S3|P2S4)…"`.
[[lean_lib]]
name = "P2S4"
srcDir = "../program-2/series-4/formal"
roots = ["P2S4", "P2S4.AxiomCheck"]

# `program-2/series-5/formal/` — Program 2 Series 5 (2.5), THE LOOP. Imports its predecessor `P2S4` (and through
# it, transitively, `P2S3` / `P2S2` / `P2S1` / `P2S0` / the `P1` foundation); it does NOT import `P2S4`'s
# predecessors directly. `P2S5` imports `P2S5.ws1`…`P2S5.ws5`; `P2S5.AxiomCheck` runs the axiom pass. The fold
# (on the P1 diagonal) and the causal relation (`causalDep`, a structural reification-dependency) are built
# FRESH. Gate: `check program-2/series-5 "^import (P2S4|P2S5)…"`.
[[lean_lib]]
name = "P2S5"
srcDir = "../program-2/series-5/formal"
roots = ["P2S5", "P2S5.AxiomCheck"]

# `program-2/series-6/formal/` — Program 2 Series 6 (2.6), THE THREAD. Imports its predecessor `P2S5` (and through
# it, transitively, `P2S4` / `P2S3` / `P2S2` / `P2S1` / `P2S0` / the `P1` foundation); it does NOT import `P2S5`'s
# predecessors directly. `P2S6` imports `P2S6.ws1`…`P2S6.ws5`; `P2S6.AxiomCheck` runs the axiom pass. The weak
# continuity (a successor-continuity lift, coarser than the rank lift that fixes strict identity) is built FRESH,
# and the single lived line is read as `P2S1.ws4_linearization_import`. Gate: `check program-2/series-6
# "^import (P2S5|P2S6)…"`.
[[lean_lib]]
name = "P2S6"
srcDir = "../program-2/series-6/formal"
roots = ["P2S6", "P2S6.AxiomCheck"]

# `program-2/series-7/formal/` — Program 2 Series 7 (2.7), THE LEDGER. Imports its predecessor `P2S6` (and through
