name = "RelExist"
defaultTargets = ["Series3"]

# ── Layout (Series 3 — the live series) ──────────────────────────────────────
# Series 2 is closed and frozen under `archive/`. Series 3 is the live
# development; its formal sources live in `series-3/formal/`, reached via
# `srcDir = "../series-3/formal"`. The Series 3 charter grows it (and the build
# targets) back on the new arena.

# `series-3/formal/` — the Series 3 root. A skeleton for now: an empty `Series3`
# root (no theorems yet); the Series 3 charter grows it.
[[lean_lib]]
name = "Series3"
srcDir = "../series-3/formal"
roots = ["Series3", "ws1", "ws2", "ws3", "ws4", "ws5", "ws6", "ws7", "ws8", "ws9", "AxiomCheck"]

# mathlib is retained (cache present under `.lake`) so the dependency is in place
# when the new-arena development needs it; the empty skeleton imports none of it.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.15.0"
