name = "RelExist"
defaultTargets = ["Series6"]

# ── Layout (Series 6 — the live series) ──────────────────────────────────────
# Series 3 is closed and frozen under `archive/`; Series 4 and Series 5 are complete
# under `series-4/` and `series-5/`. Series 6 is the live development; its formal
# sources live in `series-6/formal/`, reached via `srcDir = "../series-6/formal"`.
# Series 6 is WHOLLY STANDALONE (charter §1): every Series 4/5 lemma it reuses is
# transcribed into `series-6/formal/wsNN.lean` and re-namespaced `Series6.WSNN` —
# nothing is imported from `series-5/`, `series-4/`, or `archive/`.
[[lean_lib]]
name = "Series6"
srcDir = "../series-6/formal"
roots = ["Series6", "ws1", "ws2", "ws3", "ws4", "ws5", "ws6", "ws7", "AxiomCheck"]

# mathlib is retained (cache present under `.lake`) so the dependency is in place
# when the stratified development needs it; the empty skeleton imports none of it.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.15.0"
