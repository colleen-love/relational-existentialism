name = "RelExist"
defaultTargets = ["Series07", "Series12", "Series13", "P1", "P2S0", "P2S1", "P2S2", "P2S3", "P2S4", "P2S5", "P2S6", "P2S7", "P2S8", "P2S9", "P2S10", "P2S11", "P2S12", "P2S13"]

# ‚îÄ‚îÄ Layout (Series 07 complete; Series 03‚Äì06, 08‚Äì11 closed under `archive/`) ‚îÄ‚îÄ
# Series 03, 04, 05, 06, 08, 09, 10, and 11 are closed and frozen under `archive/series-03/`‚Ä¶
# `archive/series-11/`; they are no longer registered here. Series 07 is complete under
# `series-07/` and is built here so `lake build` verifies it.
#
# Each series is a distinct module namespace so they can coexist in one package:
# each series' roots live under `SeriesNN.*`. Each aggregator root `SeriesNN`
# (`<series>/formal/<Series>.lean`) imports its workstreams; the `AxiomCheck` root under each
# namespace runs `#print axioms` over that series' build.

# `series-07/formal/` ‚Äî Series 07 (complete). `Series07` imports `Series07.ws1`‚Ä¶`Series07.ws7`;
# `Series07.AxiomCheck` runs the axiom pass. Series 07 is WHOLLY STANDALONE: every Series
# 4/5/6 lemma it reuses is transcribed into `series-07/formal/Series07/wsNN.lean` and
# re-namespaced `Series07.WSNN` ‚Äî nothing is imported across series.
[[lean_lib]]
name = "Series07"
srcDir = "../program-1/series-07/formal"
roots = ["Series07", "Series07.AxiomCheck"]

# Series 08, 09, 10, and 11 are CLOSED and frozen under `archive/series-08/`‚Ä¶`archive/series-11/`;
# they are no longer registered here (their formal sources remain readable at
# `archive/series-NN/formal/` but are not built).

# `series-12/formal/` ‚Äî Series 12 (the program's terminal series). `Series12` imports
# `Series12.ws1`‚Ä¶`Series12.ws7`; `Series12.AxiomCheck` runs the axiom pass. Series 12 is WHOLLY
# STANDALONE: the one prior result it presupposes and names is Series 07, transcribed (not imported)
# into `series-12/formal/Series12/wsNN.lean` and re-namespaced `Series12.WSNN` ‚Äî nothing is imported
# across series.
[[lean_lib]]
name = "Series12"
srcDir = "../program-1/series-12/formal"
roots = ["Series12", "Series12.AxiomCheck"]

# `series-13/formal/` ‚Äî Series 13 (the post-terminal coda). `Series13` imports `Series13.ws1`‚Ä¶`Series13.ws5`;
# `Series13.AxiomCheck` runs the axiom pass. Series 13 is WHOLLY STANDALONE: the two prior results it
# presupposes and names are Series 07 and Series 12 WS1, transcribed (not imported) into
# `series-13/formal/Series13/wsNN.lean` and re-namespaced `Series13.WSNN` ‚Äî nothing is imported across series.
[[lean_lib]]
name = "Series13"
srcDir = "../program-1/series-13/formal"
roots = ["Series13", "Series13.AxiomCheck"]

# `program-2/formal/` ‚Äî the Program 2 FOUNDATION (`P1`): the Program 1 carrier consolidated under a `P1`
# namespace for Program 2 to transcribe from. `P1` imports `P1.Core` (Series 12 WS1, verbatim) and `P1.Reader`
# (Series 12 WS2, verbatim); `P1.AxiomCheck` runs the axiom pass. The `P1` namespace prefix avoids collision
# with the still-registered `Series12.*` libraries. Standalone: imports only Mathlib and itself.
[[lean_lib]]
name = "P1"
srcDir = "../program-2/formal"
roots = ["P1", "P1.AxiomCheck"]

# `program-2/series-0/formal/` ‚Äî Program 2 Series 0 (2.0), the GROUND (relating is finite attending). Unlike a
# Program 1 series, Series 0 IMPORTS the `P1` foundation (Program 2 permits it) and builds on it. `P2S0` imports
# `P2S0.ws1`‚Ä¶`P2S0.ws5`; `P2S0.AxiomCheck` runs the axiom pass. Its imports resolve only to `P1`, its own
# `P2S0.*` roots, and Mathlib (gate: `check program-2/series-0 "^import (P1|P2S0)‚Ä¶"`).
[[lean_lib]]
name = "P2S0"
srcDir = "../program-2/series-0/formal"
roots = ["P2S0", "P2S0.AxiomCheck"]

# `program-2/series-1/formal/` ‚Äî Program 2 Series 1 (2.1), the TICK. Imports the `P2S0` ground (and through it,
# transitively, the `P1` foundation); it does NOT import `P1` directly. `P2S1` imports `P2S1.ws1`‚Ä¶`P2S1.ws5`;
# `P2S1.AxiomCheck` runs the axiom pass. Gate: `check program-2/series-1 "^import (P2S0|P2S1)‚Ä¶"`.
[[lean_lib]]
name = "P2S1"
srcDir = "../program-2/series-1/formal"
roots = ["P2S1", "P2S1.AxiomCheck"]

# `program-2/series-2/formal/` ‚Äî Program 2 Series 2 (2.2), the OTHER. Imports the `P2S1` ground (and through it,
# transitively, `P2S0` and the `P1` foundation); it does NOT import `P2S0` or `P1` directly. `P2S2` imports
# `P2S2.ws1`‚Ä¶`P2S2.ws5`; `P2S2.AxiomCheck` runs the axiom pass. Gate: `check program-2/series-2 "^import (P2S1|P2S2)‚Ä¶"`.
[[lean_lib]]
name = "P2S2"
srcDir = "../program-2/series-2/formal"
roots = ["P2S2", "P2S2.AxiomCheck"]

# mathlib is retained (cache present under `.lake`); Series 07 imports it.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.15.0"

