name = "RelExist"
defaultTargets = ["Paper1"]

# ── Layout (handoff I.II — the arena reset) ──────────────────────────────────
# The project moved to a new foundation (a quantaloid / allegory with relations
# as the primitive arrow). The prior edifice — the traced-SMC papers, the theory
# and foundation layers, the conservation/sparsity frontier — is archived under
# `archive/traceable-smt/` as structural reference and is **not** built or gated. Only
# `scratch/` is live, as a buildable skeleton; spec II.1 grows it (and the build
# targets) back on the new arena.

# `scratch/` — *a self arises from the axioms*, rebuilt on the new relational
# arena. A skeleton for now: an empty `Paper1` root (no theorems yet).
[[lean_lib]]
name = "Paper1"
srcDir = "../scratch/formal"
# `Paper1` is the arena-reset root; `Spec200` mechanizes Spec 2.00's unblocked
# theorem group (T1, P0–P3); `Spec201` mechanizes Spec 2.01's two-sorted signature
# (P4s, PR-J(a), the C3 split, L1); `Spec201b` adds the transfer theorem and the
# design-ready group (T2t, PR-J(b) dichotomy, T12s, P1 barrier one, P2c, C2d).
# All are roots of the one live library.
roots = ["Paper1", "Spec200", "Spec201", "Spec201b"]

# mathlib is retained (cache present under `.lake`) so the dependency is in place
# when the new-arena development needs it; the empty skeleton imports none of it.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.15.0"
