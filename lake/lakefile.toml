# STANDALONE: every Series 10/9/8/4 lemma it reuses is transcribed into
# `series-11/formal/Series11/wsNN.lean` and re-namespaced `Series11.WSNN` ‚Äî nothing is imported
# from `series-10/`, `series-09/`, `series-08/`, `series-07/`, `series-04/`, or `archive/`.
[[lean_lib]]
