name = "RelExist"
defaultTargets = ["Series7"]

# ── Layout (Series 7 live; Series 3–6 closed and frozen under `archive/`) ──
# Series 3, 4, 5, and 6 are closed and frozen under `archive/series-3/`,
# `archive/series-4/`, `archive/series-5/`, and `archive/series-6/`; they are no
# longer registered here. Series 7 is the live development under `series-7/`, built
# here so `lake build` verifies it.
#
# Each series is a distinct module namespace so they can coexist in one package:
# Series 7's roots live under `Series7.*` (files in `series-7/formal/Series7/`). The
# aggregator root `Series7` (`series-7/formal/Series7.lean`) imports its workstreams;
# the `AxiomCheck` root runs `#print axioms` over that series' build.

# `series-7/formal/` — Series 7 (live). `Series7` imports `Series7.ws1`…`Series7.ws7`;
# `Series7.AxiomCheck` runs the axiom pass. Series 7 is WHOLLY STANDALONE: every Series
# 4/5/6 lemma it reuses is transcribed into `series-7/formal/Series7/wsNN.lean` and
# re-namespaced `Series7.WSNN` — nothing is imported across series.
[[lean_lib]]
name = "Series7"
srcDir = "../series-7/formal"
roots = ["Series7", "Series7.AxiomCheck"]

# mathlib is retained (cache present under `.lake`); all series import it.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.15.0"
