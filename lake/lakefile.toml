name = "RelExist"
defaultTargets = ["Series4"]

# ── Layout (Series 4 — the live series) ──────────────────────────────────────
# Series 3 is closed and frozen under `archive/`. Series 4 is the live
# development; its formal sources live in `series-4/formal/`, reached via
# `srcDir = "../series-4/formal"`. The Series 4 charter grows it (and the build
# targets) back on the new arena.

# `series-4/formal/` — the Series 4 root. A skeleton for now: an empty `Series4`
# root (no theorems yet); the Series 4 charter grows it.
[[lean_lib]]
name = "Series4"
srcDir = "../series-4/formal"
roots = ["Series4", "ws1", "ws2", "ws3", "ws4", "ws5", "ws6", "ws7", "AxiomCheck"]

# mathlib is retained (cache present under `.lake`) so the dependency is in place
# when the new-arena development needs it; the empty skeleton imports none of it.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.15.0"
