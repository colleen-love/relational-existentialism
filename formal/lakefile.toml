name = "RelExist"
defaultTargets = ["RelExist"]

# `RelExist` (the core) is deliberately dependency-free (no mathlib): it builds and
# checks in seconds, even in sessions where mathlib's prebuilt cache is unreachable.
# It is the default target, so `lake build` stays fast.
[[lean_lib]]
name = "RelExist"

# `Scratch` holds mathlib-dependent work (the ℝ-valued sparsity upgrade, the
# gfp/Knaster–Tarski formalization of `≈ := νΘ`, the monoidal-category layer). It is
# NOT a default target, so it is only compiled on explicit `lake build Scratch`,
# which is what triggers the (one-time, slow-without-cache) mathlib build.
[[lean_lib]]
name = "Scratch"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.15.0"
